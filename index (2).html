:root{--bg:#F5F5F7;--s:#FFF;--s2:#FAFAFA;--b:#E8E8EB;--t:#1A1A1F;--t2:#6E6E73;--t3:#AEAEB2;--t4:#D1D1D6;

--f:'DM Sans',-apple-system,sans-serif;--m:'JetBrains Mono',monospace;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:var(--f);color:var(--t);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}

#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden;position:relative}
@media(min-width:500px){#app{border-radius:22px;margin:12px auto;height:calc(100vh - 24px);border:1px solid var(--b);box-shadow:0 0 80px rgba(0,0,0,0.05)}}

/* Header */
.hdr{padding:calc(var(--st) + 6px) 16px 8px;background:rgba(245,245,247,0.86);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--b);z-index:50;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + var(--sb))}
.tb{position:absolute;bottom:0;left:0;right:0;height:calc(56px + var(--sb));padding:4px 0 var(--sb);background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--b);display:flex;z-index:50}
.tb button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:none;border:none;font-size:9px;font-weight:500;color:var(--t4);cursor:pointer;font-family:var(--f)}
.tb button.on{color:var(--a)}
.tb .ti{font-size:18px;line-height:1}

/* Shared */
.cd{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:8px}
.sc{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
.rw{display:flex;align-items:center;padding:10px 14px;gap:8px;cursor:pointer;border-bottom:0.5px solid var(--b);transition:background 0.1s}
.rw:last-child{border-bottom:none}.rw:active{background:var(--s2)}
.pg{padding:8px 14px 16px}
.sig{font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px}
.pro{padding:10px;background:var(--gbg);border-radius:8px;border-left:2px solid var(--g)}
.con{padding:10px;background:var(--rbg);border-radius:8px;border-left:2px solid var(--r)}
.bxt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.bxi{font-size:10px;line-height:1.5}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc{padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--b)}
.mc-l{font-size:8px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.mc-v{font-size:15px;font-weight:700;font-family:var(--m);margin-top:2px}

/* ═══ OVERLAY SYSTEM ═══ */
.overlay{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column}
.overlay-blur{position:absolute;inset:0;background:rgba(245,245,247,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.overlay-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}

/* Landing overlay */
.landing-hero{text-align:center;max-width:340px}
.landing-hero h1{font-size:28px;font-weight:800;line-height:1.15;letter-spacing:-.5px;margin-bottom:8px}
.landing-hero h1 span{color:var(--a)}
.landing-hero p{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.btn{padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f);border:none;width:100%;margin-bottom:8px;transition:transform 0.1s}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--t);color:#fff}
.btn-s{background:var(--s);color:var(--t);border:1.5px solid var(--b)}
.btn-a{background:var(--a);color:#fff}

/* Auth modal */
.auth-card{background:var(--s);border-radius:18px;padding:28px 24px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.08)}
.auth-card h2{font-size:20px;font-weight:800;margin-bottom:3px}
.auth-card .sub{font-size:12px;color:var(--t2);margin-bottom:16px}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;font-family:var(--f);outline:none;background:var(--s2);color:var(--t);margin-bottom:10px}
.inp:focus{border-color:var(--a)}
.inp::placeholder{color:var(--t4)}
.social-btn{width:100%;padding:11px;border:1.5px solid var(--b);border-radius:10px;background:var(--s);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.social-btn:active{background:var(--s2)}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--t4);font-size:11px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--b)}
.link{color:var(--a);font-weight:600;cursor:pointer}

/* Mascot + Onboarding */
.mascot{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--a),#4DA3FF);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;margin:0 auto 12px;box-shadow:0 4px 16px rgba(0,102,204,0.25);animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.speech{background:var(--s);border:1px solid var(--b);border-radius:16px;border-bottom-left-radius:4px;padding:14px 18px;max-width:300px;margin:0 auto 20px;box-shadow:0 2px 12px rgba(0,0,0,0.04);position:relative;font-size:14px;line-height:1.5;color:var(--t);text-align:center}

.ob-wrap{max-width:340px;width:100%}
.ob-prog{margin-bottom:20px}
.ob-bar{height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.ob-fill{height:100%;background:linear-gradient(90deg,var(--a),#4DA3FF);border-radius:2px;transition:width 0.4s ease}
.ob-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:16px;text-align:center}
.ob-opt{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--s);border:1.5px solid var(--b);border-radius:12px;margin-bottom:7px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.12s}
.ob-opt:active,.ob-opt.sel{border-color:var(--a);background:var(--abg);color:var(--a);font-weight:600}
.ob-let{width:24px;height:24px;border-radius:7px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all 0.12s}
.ob-opt.sel .ob-let{background:var(--a);color:#fff;border-color:var(--a)}

/* Result */
.res-badge{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.res-inner{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800}
.al-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px}

/* Chat */
.ch-a{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.ch-m{margin-bottom:10px;display:flex;flex-direction:column}
.ch-m.u{align-items:flex-end}.ch-m.a{align-items:flex-start}
.ch-b{max-width:82%;padding:9px 13px;border-radius:16px;font-size:12px;line-height:1.6;white-space:pre-line}
.ch-b.u{background:var(--a);color:#fff;border-bottom-right-radius:3px}
.ch-b.a{background:var(--s);border:0.5px solid var(--b);border-bottom-left-radius:3px}
.ch-ir{display:flex;gap:6px;padding:8px 12px;border-top:0.5px solid var(--b);background:var(--s);flex-shrink:0}
.ch-in{flex:1;padding:8px 12px;border:1px solid var(--b);border-radius:20px;font-size:13px;font-family:var(--f);outline:none;background:var(--s2);color:var(--t)}
.ch-snd{background:var(--a);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Premium card */
.pm{padding:16px;background:linear-gradient(135deg,var(--abg),var(--s));border:1px solid #0066CC20;border-radius:12px;margin-top:10px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes dr{to{stroke-dashoffset:0}}
.fi{animation:fadeUp 0.35s ease-out}.si{animation:slideIn 0.25s ease-out}
</style>
</head>

function risk(b){const lv=b>1.3?4:b>1.1?3:b>.9?2:1;const cs=["#16A34A","#16A34A","#F59E0B","#F97316","#DC2626"];const ls=["LOW","LOW","MEDIUM","ELEVATED","HIGH"];return `<div style="display:flex;gap:2px;margin:4px 0 2px">${[1,2,3,4,5].map(i=>`<div style="flex:1;height:4px;border-radius:2px;background:${i<=lv?cs[lv-1]:'var(--s2)'}"></div>`).join("")}</div><div style="font-size:9px;font-weight:600;color:${cs[lv-1]}">${ls[lv-1]}</div>`;}

function pick(i){ans[qi]=i;if(qi<QS.length-1){qi++;render();}else{calcP();phase="result";render();}}
function tglM(i){if(ms.includes(i))ms=ms.filter(x=>x!==i);else ms.push(i);render();}
function nxtM(){if(!ms.length)return;ans[qi]=ms;ms=[];if(qi<QS.length-1){qi++;render();}else{calcP();phase="result";render();}}
function calcP(){let s=0;if((ans[0]||0)>=3)s+=2;if((ans[1]||0)===3)s+=3;if((ans[2]||0)>=2)s+=2;if((ans[3]||0)>=2)s+=1;if((ans[4]||0)===2)s+=3;if((ans[5]||0)>=1)s+=2;if((ans[8]||0)===1)s+=2;pType=s>=12?"a":s>=8?"g":s>=4?"m":"c";}

    <div class="cd" style="padding:12px"><div style="display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px"><div style="width:${s.an[0]/(s.an[0]+s.an[1]+s.an[2])*100}%;background:var(--g)"></div><div style="width:${s.an[1]/(s.an[0]+s.an[1]+s.an[2])*100}%;background:var(--o)"></div><div style="width:${s.an[2]/(s.an[0]+s.an[1]+s.an[2])*100}%;background:var(--r)"></div></div><div style="font-size:10px;color:var(--t2);margin-top:6px">Kursziel: <b style="color:var(--a)">${cp(s.tg)}</b></div></div>
    <div class="sc">ANALYSE</div>
    <div class="cd" style="padding:14px"><p style="font-size:12px;line-height:1.65;color:var(--t2);margin-bottom:8px">${s.de}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><div class="pro"><div class="bxt" style="color:var(--g)">KATALYSATOREN</div>${s.ca.map(c=>`<div class="bxi" style="color:#065F46">· ${c}</div>`).join("")}</div><div class="con"><div class="bxt" style="color:var(--r)">RISIKEN</div>${s.ri.map(r=>`<div class="bxi" style="color:#991B1B">· ${r}</div>`).join("")}</div></div></div>
    <div class="sc">NEWS</div>
    <div class="cd">${s.nw.map(n=>`<div class="rw" style="flex-direction:column;align-items:flex-start;gap:1px" onclick="nwO={d:'${n.d}',h:'${n.h.replace(/'/g,"\\'")}',tx:'${n.tx.replace(/'/g,"\\'")}',neg:0};tab='market';render()"><div style="font-size:7px;font-family:var(--m);color:var(--t4)">${n.d}</div><div style="font-size:10px;line-height:1.3">${n.h}</div></div>`).join("")}</div>

}

  const p=PROF[pType];

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">

function rProfile(el){
  const p=PROF[pType];
  const pf=PF.map(x=>{const st=D.find(s=>s.s===x.sym);return{...x,st,val:st.p*x.sh,cost:x.avg*x.sh,pl:(st.p-x.avg)*x.sh,pp:((st.p/x.avg)-1)*100};});
  const tv=pf.reduce((s,x)=>s+x.val,0),tc=pf.reduce((s,x)=>s+x.cost,0),tpl=tv-tc;
  const ad=pf.reduce((s,x)=>s+(x.st?.da||0)*x.sh,0);
  el.innerHTML=`<div class="pg fi">
    <div style="padding:16px;background:linear-gradient(135deg,var(--abg),var(--s));border:1px solid var(--b);border-radius:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:9px;font-weight:600;color:${p.co};letter-spacing:1px;text-transform:uppercase">${p.n}</div><div style="font-size:16px;font-weight:800;margin-top:2px">Mein Profil</div><p style="font-size:10px;color:var(--t2);line-height:1.4;margin-top:2px;max-width:220px">${p.ds}</p></div>
        <div style="width:40px;height:40px;border-radius:10px;background:${p.co};display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800">M</div></div>
      <div style="margin-top:10px"><div style="font-size:8px;font-weight:600;color:var(--t3);letter-spacing:.6px;margin-bottom:3px">ALLOKATION</div><div class="al-bar"><div style="width:${p.al[0]}%;background:${p.co}"></div><div style="width:${p.al[1]}%;background:${p.co}50"></div><div style="width:${p.al[2]}%;background:var(--b)"></div></div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:10px">${[["Wert",cp(tv),"var(--t)"],["Investiert",cp(tc),"var(--t2)"],["P&L",(tpl>=0?"+":"")+cp(tpl),tpl>=0?"var(--g)":"var(--r)"],["Div/J",cp(ad),"var(--g)"]].map(([l,v,c])=>`<div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:7px;text-align:center"><div style="font-size:7px;font-weight:600;color:var(--t3)">${l}</div><div style="font-size:12px;font-weight:700;font-family:var(--m);color:${c};margin-top:1px">${v}</div></div>`).join("")}</div>
    <div class="sc">POSITIONEN</div>
    <div class="cd">${pf.map(x=>`<div class="rw" onclick="sel='${x.sym}';tab='screener';render()">
      <div style="width:26px;height:26px;border-radius:6px;background:${x.pl>=0?'var(--gbg)':'var(--rbg)'};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${x.pl>=0?'var(--g)':'var(--r)'}">${x.sym.slice(0,2)}</div>
      <div style="flex:1"><div style="font-size:11px;font-weight:600">${x.sym} <span style="font-size:9px;color:var(--t3);font-weight:400">${x.sh} Stk</span></div></div>
      ${mch(ch[x.sym],40,12)}
      <div style="text-align:right"><div style="font-size:11px;font-weight:600;font-family:var(--m)">${cp(x.val)}</div><div style="font-size:9px;font-weight:600;color:${x.pl>=0?'var(--g)':'var(--r)'}">${x.pl>=0?'+':''}${cp(x.pl)}</div></div></div>`).join("")}</div>
    <div class="sc">ALERTS</div>
    <div class="cd">${[{t:"BMW RSI unter 30",d:"Kaufsignal",tm:"09:15",rd:0},{t:"ALV Dividende 17,10",d:"Ex-Tag 08.05.",tm:"08:30",rd:0},{t:"DAX unter 22.500",d:"Support erreicht",tm:"07:45",rd:1}].map(a=>`<div class="rw" style="opacity:${a.rd?.5:1}"><div style="width:5px;height:5px;border-radius:50%;background:${a.rd?'var(--t4)':'var(--a)'};margin-top:4px;flex-shrink:0"></div><div style="flex:1"><div style="font-size:10px;font-weight:600">${a.t}</div><div style="font-size:9px;color:var(--t2)">${a.d}</div></div><span style="font-size:8px;font-family:var(--m);color:var(--t4)">${a.tm}</span></div>`).join("")}</div>
    <div class="pm"><div style="font-size:9px;font-weight:600;color:var(--a);letter-spacing:.8px">PREMIUM</div><div style="font-size:12px;font-weight:700;margin:2px 0">Personalisierte Weekly Reports</div><div style="font-size:10px;color:var(--t2);line-height:1.4;margin-bottom:8px">Wöchentlicher Report + tägliches Briefing + Echtzeit-Alerts.</div>
    <div style="display:flex;gap:6px"><button class="btn btn-a" style="font-size:11px;padding:9px;flex:1;margin:0">Premium 14,99/Mo</button><button class="btn btn-p" style="font-size:11px;padding:9px;flex:1;margin:0">Concierge 49,99/Mo</button></div></div>
  </div>`;
}

function rChat(el){
  el.innerHTML=`<div style="display:flex;flex-direction:column;height:calc(100vh - 115px - var(--sb) - var(--st))">
    <div class="ch-a" id="ca">${chatH.map(m=>`<div class="ch-m ${m.r==='a'?'a':'u'}"><div class="ch-b ${m.r==='a'?'a':'u'}">${m.t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')}</div></div>`).join("")}</div>
    <div class="ch-ir"><input class="ch-in" id="ci" placeholder="Frage eingeben..." onkeydown="if(event.key==='Enter')sndC()"><button class="ch-snd" onclick="sndC()">↑</button></div></div>`;
  const a=document.getElementById("ca");if(a)a.scrollTop=a.scrollHeight;
}

function sndC(){const inp=document.getElementById("ci");const q=inp.value.trim();if(!q)return;chatH.push({r:"u",t:q});inp.value="";rChat(document.getElementById("cnt"));
setTimeout(()=>{const ql=q.toLowerCase();let r="";
if(ql.includes("portfolio")||ql.includes("mein")){const pf=PF.map(x=>{const st=D.find(s=>s.s===x.sym);return{...x,st,val:st.p*x.sh,pl:(st.p-x.avg)*x.sh};});const tv=pf.reduce((s,x)=>s+x.val,0);const tc=PF.reduce((s,x)=>s+x.avg*x.sh,0);
r=`PORTFOLIO\n\nWert: ${cp(tv)}\nP&L: ${tv>=tc?'+':''}${cp(tv-tc)}\n\n${pf.map(x=>`${x.sym}: ${x.sh}x = ${cp(x.val)} (${x.pl>=0?'+':''}${cp(x.pl)})`).join('\n')}`;}
else if(ql.includes("allianz")||ql.includes("alv"))r=`ALLIANZ (ALV)\n\n${cp(312.80)} (+1,34%)\nKGV 11,2 | Div 4,8% | Score 91\nDiv: ${cp(17.10)}\n\n**STRONG BUY** | Ziel ${cp(348)}`;
else if(ql.includes("bmw")&&ql.includes("merc"))r=`VERGLEICH\n\n      BMW    MBG\nKGV   6,8    5,8\nDiv   5,4%   6,4%\nRSI   28     32\n\nMBG = mehr Div.\nBMW = mehr Cash.`;
else if(ql.includes("markt")||ql.includes("dax"))r=`MARKTLAGE\n\nDAX 22.380 (-2,0%)\nIran + EZB hawkish\nSupport: 22.000\nRSI: 35 (überverkauft)`;
else if(ql.includes("unterbewertet"))r=`UNTERBEWERTETE DAX\n\n1. VOW3 KGV 3,8\n2. MBG KGV 5,8\n3. BMW KGV 6,8`;
else if(ql.includes("dividende"))r=`TOP DIVIDENDEN\n\n1. MBG 6,4%\n2. VW 5,8%\n3. BMW 5,4%\n4. ALV 4,8%`;
else r=`Abfragen:\n· Analysiere Allianz\n· BMW vs Mercedes\n· Unterbewertet\n· Dividende\n· Marktlage\n· Mein Portfolio`;
chatH.push({r:"a",t:r});rChat(document.getElementById("cnt"));},400);}

// ═══ INIT ═══
render();
</script>
