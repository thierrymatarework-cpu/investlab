<style>
:root{--bg:#F5F5F7;--s:#FFF;--s2:#FAFAFA;--b:#E8E8EB;--t:#1A1A1F;--t2:#6E6E73;--t3:#AEAEB2;--t4:#D1D1D6;
--a:#0066CC;--abg:#EBF5FF;--g:#16A34A;--gbg:#F0FDF4;--r:#DC2626;--rbg:#FEF2F2;--o:#CA8A04;
--f:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--m:'JetBrains Mono',monospace;
--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:var(--f);color:var(--t);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}

/* Shell */
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden}
@media(min-width:500px){#app{border-radius:22px;margin:12px auto;height:calc(100vh - 24px);border:1px solid var(--b);box-shadow:0 0 80px rgba(0,0,0,0.05)}}

/* Header */
.hdr{padding:calc(var(--st) + 6px) 16px 8px;background:rgba(245,245,247,0.86);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--b);z-index:90;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:6px}
.hdr-ic{width:24px;height:24px;border-radius:6px;background:var(--a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px}
.hdr-t{font-size:14px;font-weight:700;letter-spacing:-0.3px}
.hdr-r{display:flex;align-items:center;gap:6px}
.cur-sw{display:flex;background:var(--s2);border-radius:5px;border:1px solid var(--b);overflow:hidden}
.cur-b{background:transparent;border:none;padding:3px 7px;font-size:9px;font-weight:600;color:var(--t4);cursor:pointer;font-family:var(--f)}
.cur-b.on{background:var(--t);color:#fff}

/* Scroll area */
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + var(--sb))}

/* Tab bar */
.tb{position:absolute;bottom:0;left:0;right:0;height:calc(56px + var(--sb));padding:4px 0 var(--sb);
background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:0.5px solid var(--b);display:flex;z-index:90}
.tb button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
background:none;border:none;font-size:9px;font-weight:500;color:var(--t4);cursor:pointer;font-family:var(--f);transition:color 0.12s}
.tb button.on{color:var(--a)}
.tb .ti{font-size:20px;line-height:1}

/* Shared */
.cd{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:8px}
.sc{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding:0 2px}
.rw{display:flex;align-items:center;padding:10px 14px;gap:8px;cursor:pointer;border-bottom:0.5px solid var(--b);transition:background 0.1s}
.rw:last-child{border-bottom:none}
.rw:active{background:var(--s2)}
.pg{display:none;padding:8px 14px 16px}.pg.on{display:block}

/* Onboarding */
.ob-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:var(--bg)}
.ob-prog{width:100%;max-width:360px;margin-bottom:28px}
.ob-bar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}.ob-fill{height:100%;background:var(--a);border-radius:2px;transition:width 0.3s}
.ob-q{max-width:360px;width:100%}
.ob-title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:18px}
.ob-opt{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--s);border:1.5px solid var(--b);border-radius:11px;margin-bottom:7px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.12s}
.ob-opt:active,.ob-opt.sel{border-color:var(--a);background:var(--abg);color:var(--a);font-weight:600}
.ob-opt .ob-letter{width:22px;height:22px;border-radius:6px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all 0.12s}
.ob-opt.sel .ob-letter{background:var(--a);color:#fff;border-color:var(--a)}

/* Profile */
.pf-card{padding:20px;background:linear-gradient(135deg,var(--abg),var(--s));border:1px solid var(--b);border-radius:14px;margin-bottom:10px}
.pf-av{width:48px;height:48px;border-radius:12px;background:var(--a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800}
.pf-type{font-size:10px;font-weight:600;color:var(--a);letter-spacing:1px;text-transform:uppercase}
.pf-name{font-size:20px;font-weight:800;margin-top:2px}

/* Metrics grid */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc{padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--b)}
.mc-l{font-size:8px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px}
.mc-v{font-size:15px;font-weight:700;font-family:var(--m);margin-top:2px}

/* Risk */
.rb{display:flex;gap:2px;margin:4px 0 2px}.rs{flex:1;height:4px;border-radius:2px;background:var(--s2)}
.rl{font-size:9px;font-weight:600}

/* Pro/Con boxes */
.pro{padding:10px;background:var(--gbg);border-radius:8px;border-left:2px solid var(--g)}
.con{padding:10px;background:var(--rbg);border-radius:8px;border-left:2px solid var(--r)}
.bxt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:3px}
.bxi{font-size:10px;line-height:1.5}

/* Signal badge */
.sig{font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.3px}

/* Chat */
.ch-a{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.ch-m{margin-bottom:10px;display:flex;flex-direction:column}
.ch-m.u{align-items:flex-end}.ch-m.a{align-items:flex-start}
.ch-b{max-width:82%;padding:9px 13px;border-radius:16px;font-size:12px;line-height:1.6;white-space:pre-line}
.ch-b.u{background:var(--a);color:#fff;border-bottom-right-radius:3px}
.ch-b.a{background:var(--s);border:0.5px solid var(--b);border-bottom-left-radius:3px}
.ch-w{font-size:7px;color:var(--t4);margin-top:2px;letter-spacing:0.5px;text-transform:uppercase}
.ch-ir{display:flex;gap:6px;padding:8px 12px;border-top:0.5px solid var(--b);background:var(--s);flex-shrink:0}
.ch-in{flex:1;padding:8px 12px;border:1px solid var(--b);border-radius:20px;font-size:13px;font-family:var(--f);outline:none;background:var(--s2);color:var(--t)}
.ch-snd{background:var(--a);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Alloc bar */
.al-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;gap:1px}

/* Animations */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes dr{to{stroke-dashoffset:0}}
.fi{animation:fi 0.25s ease-out}.si{animation:si 0.25s ease-out}

/* Premium card */
.pm{padding:16px;background:linear-gradient(135deg,var(--abg),var(--s));border:1px solid var(--a)20;border-radius:12px;margin-top:10px}
.pm-btn{padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f);flex:1;text-align:center}
</style>
</head>

    <div class="cd">${[{t:"BMW RSI unter 30",d:"Kaufsignal für dein Profil",tm:"09:15",rd:0},{t:"Allianz: Dividende 17,10 bestätigt",d:"Ex-Tag 08.05.2026",tm:"08:30",rd:0},{t:"DAX unter 22.500",d:"Support-Level erreicht",tm:"07:45",rd:1}].map(a=>`<div class="rw" style="opacity:${a.rd?.5:1}"><div style="width:5px;height:5px;border-radius:50%;background:${a.rd?"var(--t4)":"var(--a)"};margin-top:4px;flex-shrink:0"></div><div style="flex:1"><div style="font-size:11px;font-weight:600">${a.t}</div><div style="font-size:9px;color:var(--t2)">${a.d}</div></div><span style="font-size:8px;font-family:var(--m);color:var(--t4)">${a.tm}</span></div>`).join("")}</div>
    <div class="pm"><div style="font-size:9px;font-weight:600;color:var(--a);letter-spacing:.8px">PREMIUM</div>
      <div style="font-size:13px;font-weight:700;margin:3px 0">Personalisierte Reports</div>
      <div style="font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:10px">Wöchentlicher Report: Deine Top 5 Aktien passend zu deinem ${p.n}-Profil. Tägliches Morgen-Briefing. Echtzeit-Alerts.</div>
      <div style="display:flex;gap:6px"><div class="pm-btn" style="background:var(--a);color:#fff">Premium 14,99/Mo</div><div class="pm-btn" style="background:var(--t);color:#fff">Concierge 49,99/Mo</div></div></div>
  </div>`;
}

function rChat(el){
  el.innerHTML=`<div class="pg on" style="display:flex;flex-direction:column;height:calc(100vh - 120px - var(--sb) - var(--st))">
    <div class="ch-a" id="ca">${chatH.map(m=>`<div class="ch-m ${m.r==="a"?"a":"u"}"><div class="ch-b ${m.r==="a"?"a":"u"}">${m.t.replace(/\n/g,"<br>").replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")}</div></div>`).join("")}</div>
    <div class="ch-ir"><input class="ch-in" id="ci" placeholder="Frage eingeben..." onkeydown="if(event.key==='Enter')sndC()"><button class="ch-snd" onclick="sndC()">↑</button></div></div>`;
  const a=document.getElementById("ca");if(a)a.scrollTop=a.scrollHeight;
}

function sndC(){const inp=document.getElementById("ci");const q=inp.value.trim();if(!q)return;chatH.push({r:"u",t:q});inp.value="";rChat(document.getElementById("cnt"));
  setTimeout(()=>{const ql=q.toLowerCase();let r="";
    if(ql.includes("portfolio")||ql.includes("mein")){const pf=PF.map(x=>{const st=D.find(s=>s.s===x.sym);return{...x,st,val:st.p*x.sh,pl:(st.p-x.avg)*x.sh};});const tv=pf.reduce((s,x)=>s+x.val,0);const tc=PF.reduce((s,x)=>s+x.avg*x.sh,0);
      r=`PORTFOLIO\n\nWert: ${cp(tv)}\nInvestiert: ${cp(tc)}\nP&L: ${tv>=tc?"+":""}${cp(tv-tc)} (${pc((tv/tc-1)*100)})\n\n${pf.map(x=>`${x.sym}: ${x.sh}x @ ${cp(x.st.p)} = ${cp(x.val)} (${x.pl>=0?"+":""}${cp(x.pl)})`).join("\n")}`;}
    else if(ql.includes("allianz")||ql.includes("alv"))r=`ALLIANZ (ALV)\n\n${cp(312.80)} (+1,34%)\nKGV 11,2 | Div 4,8% | Score 91\nDiv: ${cp(17.10)} | Rückkauf 2,5 Mrd.\n\n**STRONG BUY** | Ziel ${cp(348)}`;
    else if(ql.includes("bmw")&&ql.includes("merc"))r=`VERGLEICH\n\n      BMW    MBG\nKGV   6,8    5,8\nDiv   5,4%   6,4%\nRSI   28     32\n\nMBG = mehr Div. BMW = mehr Cash.`;
    else if(ql.includes("markt")||ql.includes("dax"))r=`MARKTLAGE\n\nDAX: 22.380 (-2,0%)\nIran-Krieg + EZB hawkish\nZykliker schwach, Defensive stark\nSupport: 22.000 | RSI: 35`;
    else if(ql.includes("unterbewertet"))r=`UNTERBEWERTETE DAX\n\n1. VOW3 KGV 3,8 | KBV 0,4\n2. MBG KGV 5,8 | KBV 0,7\n3. BMW KGV 6,8 | KBV 0,8`;
    else if(ql.includes("dividende"))r=`TOP DIVIDENDEN\n\n1. MBG 6,4% (${cp(3.50)})\n2. VW 5,8% (${cp(5.26)})\n3. BMW 5,4% (${cp(4.40)})\n4. ALV 4,8% (${cp(17.10)})`;
    else r=`Abfragen:\n· Analysiere Allianz\n· BMW vs Mercedes\n· Unterbewertet\n· Dividende\n· Marktlage\n· Mein Portfolio`;
    chatH.push({r:"a",t:r});rChat(document.getElementById("cnt"));
  },400);
}

render();
</script>
