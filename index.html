<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FAFAFA">
<title>MarketLab — Aktien-Analyse für Privatanleger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAFA;--s:#FFF;--s2:#F5F5F7;--b:#E8E8EB;--t:#1A1A1F;--t2:#6E6E73;--t3:#AEAEB2;--t4:#D1D1D6;
--a:#0066CC;--abg:#EBF4FF;--g:#16A34A;--r:#DC2626;
--f:'DM Sans',-apple-system,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;scroll-behavior:smooth}
body{font-family:var(--f);color:var(--t);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100%}
::selection{background:var(--a);color:#fff}
a{color:var(--a);text-decoration:none}

/* ── LANDING ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 40px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,var(--a)08,transparent 70%);pointer-events:none}
.hero::after{content:"";position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,#16A34A06,transparent 70%);pointer-events:none}

.logo{display:flex;align-items:center;gap:8px;margin-bottom:40px}
.logo-ic{width:36px;height:36px;border-radius:9px;background:var(--a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.logo-t{font-size:20px;font-weight:800;letter-spacing:-0.5px}

.hero h1{font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1.1;letter-spacing:-1px;max-width:600px;margin-bottom:16px}
.hero h1 span{color:var(--a)}
.hero p{font-size:clamp(15px,2.5vw,18px);color:var(--t2);line-height:1.6;max-width:480px;margin-bottom:32px}

.cta-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:14px 32px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--f);border:none;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--t);color:#fff}
.btn-primary:hover{background:#333}
.btn-secondary{background:var(--s);color:var(--t);border:1.5px solid var(--b)}
.btn-secondary:hover{border-color:var(--t3)}
.btn-sm{padding:10px 20px;font-size:13px;border-radius:8px}

/* Stats */
.stats{display:flex;gap:32px;margin-top:48px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.stat-val{font-size:28px;font-weight:800;font-family:var(--m);color:var(--a)}
.stat-lbl{font-size:12px;color:var(--t3);margin-top:2px}

/* Features */
.features{padding:80px 24px;max-width:960px;margin:0 auto}
.features h2{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;letter-spacing:-0.5px}
.features .sub{font-size:15px;color:var(--t2);text-align:center;margin-bottom:40px}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.feat{padding:24px;background:var(--s);border:1px solid var(--b);border-radius:14px;transition:all 0.2s}
.feat:hover{box-shadow:0 8px 24px rgba(0,0,0,0.04);transform:translateY(-2px)}
.feat-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.feat h3{font-size:15px;font-weight:700;margin-bottom:4px}
.feat p{font-size:13px;color:var(--t2);line-height:1.6}

/* Pricing */
.pricing{padding:80px 24px;background:var(--s);border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.pricing h2{font-size:28px;font-weight:800;text-align:center;margin-bottom:40px}
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;max-width:800px;margin:0 auto}
.price-card{padding:24px;border:1.5px solid var(--b);border-radius:14px;position:relative}
.price-card.pop{border-color:var(--a);background:var(--abg)}
.price-pop{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--a);color:#fff;font-size:10px;font-weight:700;padding:2px 12px;border-radius:10px;letter-spacing:0.5px}
.price-name{font-size:14px;font-weight:700;color:var(--t2)}
.price-val{font-size:32px;font-weight:800;margin:8px 0 4px;font-family:var(--m)}
.price-per{font-size:12px;color:var(--t3)}
.price-feat{margin-top:16px;list-style:none}
.price-feat li{font-size:13px;color:var(--t2);padding:6px 0;border-bottom:1px solid var(--b);display:flex;gap:6px;align-items:center}
.price-feat li:last-child{border:none}
.price-feat .ck{color:var(--g);font-weight:700}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{background:var(--s);border-radius:18px;max-width:380px;width:100%;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.12);transform:translateY(20px);transition:transform 0.25s}
.modal-bg.on .modal{transform:translateY(0)}
.modal h2{font-size:22px;font-weight:800;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--t2);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--t3);padding:4px}

.inp-group{margin-bottom:14px}
.inp-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--b);border-radius:10px;font-size:15px;font-family:var(--f);outline:none;background:var(--s2);color:var(--t);transition:border-color 0.15s}
.inp:focus{border-color:var(--a)}
.inp::placeholder{color:var(--t4)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--t4);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--b)}
.social-btn{width:100%;padding:11px;border:1.5px solid var(--b);border-radius:10px;background:var(--s);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all 0.12s}
.social-btn:hover{border-color:var(--t3);background:var(--s2)}
.link{color:var(--a);font-weight:600;cursor:pointer}

/* Onboarding */
.ob-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:var(--bg)}
.ob-prog{width:100%;max-width:380px;margin-bottom:28px}
.ob-bar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.ob-fill{height:100%;background:var(--a);border-radius:2px;transition:width 0.4s ease}
.ob-q{max-width:380px;width:100%}
.ob-title{font-size:22px;font-weight:700;line-height:1.3;margin-bottom:20px}
.ob-opt{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--s);border:1.5px solid var(--b);border-radius:12px;margin-bottom:8px;cursor:pointer;font-size:15px;font-weight:500;transition:all 0.12s}
.ob-opt:active,.ob-opt.sel{border-color:var(--a);background:var(--abg);color:var(--a);font-weight:600}
.ob-let{width:24px;height:24px;border-radius:7px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all 0.12s}
.ob-opt.sel .ob-let{background:var(--a);color:#fff;border-color:var(--a)}
.ob-next{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f);margin-top:8px;transition:all 0.12s}

/* Result */
.res-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.res-icon{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.res-icon-inner{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800}
.res-type{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.res-name{font-size:26px;font-weight:800;margin:6px 0 8px}
.res-desc{font-size:14px;color:var(--t2);line-height:1.6;max-width:380px;margin:0 auto 24px}
.al-card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:18px;max-width:380px;width:100%;margin:0 auto 24px;text-align:left}
.al-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px}

/* Footer */
footer{padding:40px 24px;text-align:center}
footer p{font-size:11px;color:var(--t4)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fi{animation:fadeUp 0.4s ease-out}
.si{animation:slideIn 0.3s ease-out}
</style>
</head>

      <button class="social-btn" onclick="startOnboarding()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Mit Google anmelden</button>
      <button class="social-btn" onclick="startOnboarding()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.18 0-.36-.02-.53-.06.02-.17.04-.37.04-.56 0-1.12.487-2.16 1.24-2.98C13.69 1.6 14.98.87 16.025.83c.04.2.06.4.06.6zM20.498 17.58c-.35.8-.52 1.17-.97 1.87-.63.97-1.52 2.17-2.62 2.18-1 .01-1.25-.65-2.6-.64-1.35.01-1.62.65-2.62.65-1.1-.01-1.94-1.09-2.58-2.06-1.78-2.71-1.97-5.9-.87-7.59.78-1.2 2.01-1.9 3.15-1.9 1.18 0 1.92.65 2.88.65.94 0 1.52-.65 2.87-.65 1 0 2.08.55 2.77 1.49-2.44 1.34-2.04 4.83.58 5.99z" fill="currentColor"/></svg> Mit Apple anmelden</button>
      <div class="divider">oder</div>
      <div class="inp-group"><label class="inp-label">E-Mail</label><input class="inp" type="email" placeholder="name@beispiel.de"></div>
      <div class="inp-group"><label class="inp-label">Passwort</label><input class="inp" type="password" placeholder="Passwort"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="startOnboarding()">Anmelden</button>
      <p style="font-size:12px;color:var(--t3);text-align:center;margin-top:12px">Noch kein Konto? <span class="link" onclick="modal='signup';r();">Registrieren</span></p>
    `}
  </div>
</div>`;
}

function rOb(){
  const q=QS[qi];const prog=((qi+1)/QS.length*100);
  return `<div class="ob-page si" key="${qi}">
    <div class="ob-prog"><div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:12px;font-weight:600;color:var(--t2)">Frage ${qi+1} von ${QS.length}</span>
      ${qi>0?`<span onclick="qi--;r()" style="font-size:12px;font-weight:600;color:var(--a);cursor:pointer">Zurück</span>`:""}</div>
    <div class="ob-bar"><div class="ob-fill" style="width:${prog}%"></div></div></div>
    <div class="ob-q"><div class="ob-title">${q.q}</div>
    ${q.o.map((o,i)=>`<div class="ob-opt ${q.multi&&ms.includes(i)?"sel":""}" onclick="${q.multi?`tglM(${i})`:`pick(${i})`}"><span class="ob-let">${q.multi&&ms.includes(i)?"✓":String.fromCharCode(65+i)}</span>${o}</div>`).join("")}
    ${q.multi?`<button class="ob-next" style="background:${ms.length?"var(--t)":"#DDD"};color:${ms.length?"#fff":"#999"}" onclick="nxtM()">Weiter</button>`:""}</div>
  </div>`;
}

function rResult(){
  const p=PROF[pType];
  return `<div class="res-page fi">
    <div class="res-icon" style="background:${p.co}10;border:2px solid ${p.co}20">
      <div class="res-icon-inner" style="background:${p.co}">M</div></div>
    <div class="res-type" style="color:${p.co}">Dein Investorprofil</div>
    <div class="res-name">${p.n}</div>
    <p class="res-desc">${p.ds}</p>
    <div class="al-card">
      <div style="font-size:10px;font-weight:600;color:var(--t3);letter-spacing:1px;margin-bottom:8px">EMPFOHLENE ALLOKATION</div>
      <div class="al-bar"><div style="width:${p.al[0]}%;background:${p.co}"></div><div style="width:${p.al[1]}%;background:${p.co}50"></div><div style="width:${p.al[2]}%;background:var(--b)"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t2)">${AL.map((l,i)=>`<span><b style="color:${i===0?p.co:'var(--t2)'}">${p.al[i]}%</b> ${l}</span>`).join("")}</div>
    </div>
    <button class="btn btn-primary" style="max-width:380px;width:100%" onclick="window.location.href='marketlab-pwa.html'">Weiter zur App</button>
    <p style="font-size:11px;color:var(--t4);margin-top:12px">Dein Profil wird gespeichert und kann jederzeit angepasst werden.</p>
  </div>`;
}

// ═══ ACTIONS ═══
function openModal(type){modal=type;r();}
function startOnboarding(){modal=null;page="onboarding";qi=0;ans={};ms=[];r();}
function pick(i){ans[qi]=i;if(qi<QS.length-1){qi++;r();}else{calcP();page="result";r();}}
function tglM(i){if(ms.includes(i))ms=ms.filter(x=>x!==i);else ms.push(i);r();}
function nxtM(){if(!ms.length)return;ans[qi]=ms;ms=[];if(qi<QS.length-1){qi++;r();}else{calcP();page="result";r();}}
function calcP(){let s=0;if((ans[0]||0)>=3)s+=2;if((ans[1]||0)===3)s+=3;if((ans[2]||0)>=2)s+=2;if((ans[3]||0)>=2)s+=1;if((ans[4]||0)===2)s+=3;if((ans[5]||0)>=1)s+=2;if((ans[8]||0)===1)s+=2;
pType=s>=12?"a":s>=8?"g":s>=4?"m":"c";}

function bindEvents(){
  // Smooth scroll for feature links etc
  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener("click",e=>{e.preventDefault();document.querySelector(a.getAttribute("href"))?.scrollIntoView({behavior:"smooth"});});
  });
}

r();
</script>
